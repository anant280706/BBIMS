{% extends 'polls/base.html' %}
{% block title %}<title>Search</title>{% endblock %}
{% block contents %}
{% load static %}

<style>

/* 🔥 BACKGROUND SECTION */
.search-bg {
  background: url('https://images.unsplash.com/photo-1581594693702-fbdc51b2763b') no-repeat center;
  background-size: cover;
  position: relative;
  min-height: 90vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* 🔥 DARK BLUR OVERLAY */
.search-bg::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  backdrop-filter: blur(8px);
  background: rgba(0,0,0,0.5);
}

/* 🔥 CARD */
.search-card {
  position: relative;
  z-index: 2;
  width: 100%;
  max-width: 600px;
  background: white;
  padding: 40px;
  border-radius: 20px;
  box-shadow: 0px 10px 30px rgba(0,0,0,0.3);
  text-align: center;
}

/* 🔥 BUTTON */
.btn-custom {
  background: #d9534f;
  color: white;
  padding: 12px;
  border-radius: 25px;
  border: none;
  width: 100%;
}

</style>

<div class="search-bg">

  <div class="search-card">

    <h3 class="text-danger mb-3">🔍 Find Blood Donors</h3>

    <p class="mb-4 text-muted">
      Enter your requirements and find donors instantly near you.
    </p>

    <form action="{% url 'search_list' %}" method="post">
      {% csrf_token %}
      {{forms.as_p}}

      <button type="submit" class="btn-custom">
        Search Now
      </button>
    </form>

  </div>

</div>

{% endblock %}
