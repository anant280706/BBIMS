{% extends 'polls/base.html' %}

{% block title %}
<title>Contact Us</title>
{% endblock %}

{% block contents %}

<style>
  body {
    background: url('https://images.unsplash.com/photo-1521791136064-7986c2920216') no-repeat center center/cover;
  }

  .overlay {
    background: rgba(0,0,0,0.6);
    min-height: 100vh;
    padding: 40px 0;
  }

  .contact-container {
    max-width: 1100px;
    margin: auto;
  }

  .contact-card {
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 15px 50px rgba(0,0,0,0.5);
    border: none;
    backdrop-filter: blur(12px);
  }

  /* 🔥 LEFT SIDE PREMIUM */
  .left-section {
    background: linear-gradient(135deg, #ff416c, #ff4b2b);
    color: white;
    padding: 50px 30px;
  }

  .left-section h3 {
    margin-bottom: 30px;
    font-weight: 800;
    font-size: 24px;
  }

  /* CARD STYLE BOX */
  .info-box {
    display: flex;
    align-items: center;
    margin-bottom: 20px;
    padding: 15px;
    border-radius: 12px;
    background: rgba(255,255,255,0.1);
    transition: 0.3s;
  }

  .info-box:hover {
    background: rgba(255,255,255,0.2);
    transform: translateY(-5px);
  }

  /* ICON STYLE */
  .info-box i {
    font-size: 18px;
    margin-right: 15px;
    padding: 12px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    transition: 0.3s;
  }

  /* ICON COLOR HOVER 🔥 */
  .info-box:hover i {
    background: white;
    color: #ff416c;
  }

  .info-box p {
    margin: 0;
    font-size: 15px;
    font-weight: 500;
  }

  .info-names p {
    font-weight: 600;
  }

  /* SOCIAL ICONS */
  .social-icons {
    margin-top: 30px;
  }

  .social-icons i {
    font-size: 18px;
    margin-right: 10px;
    padding: 12px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    transition: 0.3s;
    cursor: pointer;
  }

  .social-icons i:hover {
    background: white;
    color: #ff416c;
    transform: scale(1.1);
  }

  /* RIGHT SIDE */
  .right-section {
    padding: 40px;
    background: rgba(255,255,255,0.95);
  }

  .right-section h3 {
    margin-bottom: 25px;
    color: #333;
    font-weight: 700;
  }

  input, textarea {
    width: 100%;
    padding: 12px 15px;
    margin-bottom: 15px;
    border-radius: 10px;
    border: 1px solid #ccc;
    transition: 0.3s;
  }

  input:focus, textarea:focus {
    border-color: #ff416c;
    box-shadow: 0 0 8px rgba(255,65,108,0.4);
    outline: none;
  }

  .btn-danger {
    background: linear-gradient(135deg, #ff416c, #ff4b2b);
    border: none;
    padding: 12px 25px;
    border-radius: 10px;
    font-weight: 600;
    transition: 0.3s;
  }

  .btn-danger:hover {
    transform: scale(1.05);
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
  }
  a { text-decoration: none; color: inherit; }
</style>

<div class="overlay">
  <div class="container contact-container">
    <div class="card contact-card">
      <div class="row g-0">

        <!-- 🔥 LEFT SIDE FINAL -->
        <div class="col-md-5 left-section">
          <h3>Contact Information</h3>

          <div class="info-box">
            <i class="fas fa-user"></i>
            <div class="info-names">
              <p>Thakor Anant</p>
              <p>Mahida Mantra</p>
              <p>Solanki Sujal</p>
            </div>
          </div>

          <div class="info-box">
            <i class="fas fa-phone"></i>
            <p><a href="tel:+91XXXXXXXXXX">+91 XXXXXXXX</a></p>
          </div>

          <div class="info-box">
            <i class="fas fa-envelope"></i>
            <p><a href="mailto:example@gmail.com">example@gmail.com</a></p>
          </div>

          <div class="info-box">
            <i class="fas fa-map-marker-alt"></i>
            <p>Gujarat, India</p>
          </div>

          <!-- 🔥 SOCIAL MEDIA -->
          <div class="social-icons">
            <a href="https://instagram.com/your_username" target="_blank">
              <i class="fab fa-instagram"></i>
            </a>
            <a href="https://wa.me/91XXXXXXXXXX" target="_blank">
              <i class="fab fa-whatsapp"></i>
            </a>
            <a href="https://facebook.com/your_profile" target="_blank">
              <i class="fab fa-facebook"></i>
            </a>
          </div>
        </div>

        <!-- RIGHT SIDE -->
        <div class="col-md-7 right-section">
          <h3>Send Message</h3>

          <form method="post">
            {% csrf_token %}

            {{ forms.as_p }}

            <button type="submit" class="btn btn-danger">Send Message</button>
          </form>
        </div>

      </div>
    </div>
  </div>
</div>

{% endblock %}
